<html>

<head>
    <title>HTML Multimedia and iFrame Practice</title>
</head>

<body>

    <h1>HTML Multimedia Practice</h1>

    <!-- PART 1 : AUDIO PRACTICE -->
    <h2>Audio Player</h2>

    <audio controls autoplay muted loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>


    <br><br>


    <!-- PART 2 : VIDEO PRACTICE -->
    <h2>Video Player</h2>

    <video width="500" height="300" controls muted>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>


    <br><br>


    <!-- PART 3 : IFRAME PRACTICE -->

    <h2>Iframe Examples</h2>

    <!-- 1. Video inside iframe -->
    <iframe width="500" height="300" src="https://www.youtube.com/watch?v=e6rhUvwB5Y8">
    </iframe>

    <br><br>

    <!-- 2. External website -->
    <iframe width="800" height="400" src="https://www.tutorialspoint.com/html/index.htm">
    </iframe>

    <br><br>

    <!-- 3. Local HTML file -->
    <iframe width="600" height="300" src="sample.html">
    </iframe>

</body>

</html>
