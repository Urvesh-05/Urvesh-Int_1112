<html>

<head>
    <title>HTML Images Practice</title>
</head>

<body>

    <!-- Page Heading -->
    <h1>HTML Images</h1>

    <!-- Local Image 1 -->
    <h3>Sunset Image (PNG)</h3>
    <img src="image1.PNG" alt="Beautiful sunset" width="300">

    <!-- Local Image 2 -->
    <h3>Spongebob Image (PNG)</h3>
    <img src="image2.PNG" alt="SpongeBob picture" width="300">

    <!-- Local Image 3 with Title Attribute -->
    <h3>Flower Image (JPEG)</h3>
    <img src="image3.jpeg" alt="Flowers" width="300" title="This is a flower image">

    <!-- External Image -->
    <h3>External Image</h3>
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Beautiful lake and mountain scenery" width="300">

</body>

</html>
